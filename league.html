<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premier League Table</title>
  <link rel="stylesheet" href="theme.css">
</head>
<body>

<header>
  <h1>Premier League Table</h1>
  <p>Live standings from the 2024/25 season</p>
</header>

<nav>
  <div>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="project.html">Projects</a>
    <a href="league.html">League Table</a>
  </div>
  <div>
    <span class="user-info" id="userInfo">Welcome, <span id="username"></span> <a href="#" class="logout-btn" onclick="logout(event)">Logout</a></span>
    <a href="#" class="login-btn-nav" id="loginBtn" onclick="openLoginModal(event)">Login</a>
  </div>
</nav>

<div id="loginModal" class="modal">
  <div class="modal-content">
    <span class="modal-close" onclick="closeLoginModal()">&times;</span>
    <h2>Login</h2>
    <div class="error-msg" id="errorMsg"></div>
    <form class="modal-form" onsubmit="handleLogin(event)">
      <input type="text" id="username-input" placeholder="Username" required>
      <input type="password" id="password-input" placeholder="Password" required>
      <button type="submit">Sign In</button>
    </form>
    <p style="text-align: center; font-size: 12px; color: #95a5a6; margin-top: 15px;">Demo: matthew / password123</p>
  </div>
</div>

<div class="container">
  <div class="card">
    <h2>Premier League Standings</h2>
    <div id="loadingMsg" class="loading-msg">Loading standings...</div>
    <div id="leagueErrorMsg" style="display: none; color: #e74c3c; padding: 20px; text-align: center;"></div>
    <div id="leagueTableContainer" style="display: none;">
      <table class="league-table" id="leagueTable">
        <thead>
          <tr>
            <th>Pos</th>
            <th>Team</th>
            <th>P</th>
            <th>W</th>
            <th>D</th>
            <th>L</th>
            <th>GF</th>
            <th>GA</th>
            <th>GD</th>
            <th>Pts</th>
          </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
      </table>
    </div>
  </div>
</div>

<footer>
  <p>Valid as at 28/03/2026</p>
</footer>

<script src="script.js"></script>
<script src="api.js"></script>
<script>
  // Page-specific adaptations
  function openLoginModal(event) {
    event.preventDefault();
    const modal = document.getElementById('loginModal');
    if (modal) modal.classList.add('show');
  }
  
  function closeLoginModal() {
    const modal = document.getElementById('loginModal');
    const errorMsg = document.getElementById('errorMsg');
    if (modal) modal.classList.remove('show');
    if (errorMsg) errorMsg.style.display = 'none';
  }
  
  function handleLogin(event) {
    event.preventDefault();
    const username = document.getElementById('username-input').value;
    const password = document.getElementById('password-input').value;
    const errorMsg = document.getElementById('errorMsg');
    
    if (username === 'matthew' && password === 'password123') {
      localStorage.setItem('loggedIn', 'true');
      localStorage.setItem('username', username);
      closeLoginModal();
      location.reload();
    } else {
      if (errorMsg) {
        errorMsg.textContent = 'Invalid username or password';
        errorMsg.style.display = 'block';
      }
    }
  }
  
  function logout(event) {
    event.preventDefault();
    localStorage.removeItem('loggedIn');
    localStorage.removeItem('username');
    location.reload();
  }

  // Load league standings on page load
  async function loadLeagueStandings() {
    let standings = [];

    try {
      console.log("Fetching standings from backend...");
      
      const response = await fetch("http://localhost:5000/api/standings");

      console.log("Response status:", response.status);
      console.log("Response ok:", response.ok);
      
      const data = await response.json();
      console.log("Full API response:", data);
      
      if (data.success && data.standings) {
        standings = data.standings;
        console.log("Standings loaded:", standings.length, "teams");
      } else {
        console.error("API error:", data.error);
        document.getElementById('loadingMsg').style.display = 'none';
        document.getElementById('leagueErrorMsg').textContent = `Error: ${data.error}`;
        document.getElementById('leagueErrorMsg').style.display = 'block';
        return;
      }
    } catch (error) {
      console.error('Fetch error:', error);
      document.getElementById('loadingMsg').style.display = 'none';
      document.getElementById('leagueErrorMsg').textContent = `Error: ${error.message}. Make sure the backend server is running on port 5000.`;
      document.getElementById('leagueErrorMsg').style.display = 'block';
      return;
    }

    const tableBody = document.getElementById('tableBody');
    tableBody.innerHTML = '';

    standings.forEach(team => {
      const goalDiff = (team.goalsFor || 0) - (team.goalsAgainst || 0);
      
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${team.position}</td>
        <td class="team-name">${team.team.name}</td>
        <td>${team.playedGames}</td>
        <td>${team.won}</td>
        <td>${team.draw}</td>
        <td>${team.lost}</td>
        <td>${team.goalsFor || 0}</td>
        <td>${team.goalsAgainst || 0}</td>
        <td class="goal-difference">${goalDiff > 0 ? '+' : ''}${goalDiff}</td>
        <td class="points"><strong>${team.points}</strong></td>
      `;
      
      if (team.position <= 4) {
        row.classList.add('champion-color');
      } else if (team.position <= 6) {
        row.classList.add('european-color');
      } else if (team.position >= 18) {
        row.classList.add('relegation-color');
      }
      
      tableBody.appendChild(row);
    });

    console.log(`Successfully loaded and displayed ${standings.length} teams`);
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('leagueTableContainer').style.display = 'block';
  }

  // Load on page load
  window.addEventListener('DOMContentLoaded', () => {
    initAuth();
    loadLeagueStandings();
  });
</script>

</body>
</html>
