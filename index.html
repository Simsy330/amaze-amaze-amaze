<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      background: #fafafa;
      color: #2c3e50;
      line-height: 1.6;
    }
    header {
      background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
      color: white;
      padding: 40px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    header h1 {
      margin: 0;
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }
    header p {
      margin: 8px 0 0 0;
      font-size: 14px;
      opacity: 0.9;
    }
    nav {
      background: white;
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid #e0e0e0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    nav a {
      color: #2c3e50;
      margin: 0 20px;
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
      font-size: 15px;
      transition: color 0.3s;
    }
    nav a:hover {
      color: #3498db;
    }
    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    .card h2 {
      margin-top: 0;
      color: #2c3e50;
      font-size: 28px;
      font-weight: 600;
      border-bottom: 2px solid #3498db;
      padding-bottom: 10px;
    }
    .card p {
      line-height: 1.8;
      color: #34495e;
    }
    footer {
      text-align: center;
      padding: 20px;
      background: #2c3e50;
      color: white;
      font-size: 13px;
    }
  </style>
</head>
<body>

</header>

  </div>

</html>
